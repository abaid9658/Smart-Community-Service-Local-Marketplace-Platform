version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: localhub_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: localhub
      POSTGRES_PASSWORD: localhub_pass
      POSTGRES_DB: localhub_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U localhub -d localhub_db']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: localhub_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://localhub:localhub_pass@postgres:5432/localhub_db
      FRONTEND_URL: http://localhost:3000
    env_file:
      - .env
    ports:
      - '5000:5000'
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: localhub_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
      NEXT_PUBLIC_SOCKET_URL: http://localhost:5000
    ports:
      - '3000:3000'

volumes:
  postgres_data:
